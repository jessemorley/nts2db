<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundDrop Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-zinc-950 text-zinc-50 font-sans antialiased">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        const Svg = ({ className = "h-4 w-4", children }) => (
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"
                className={className}>
                {children}
            </svg>
        );
        const ICloud      = ({c}) => <Svg className={c}><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9z"/></Svg>;
        const IActivity   = ({c}) => <Svg className={c}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></Svg>;
        const ILoader     = ({c}) => <Svg className={c}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></Svg>;
        const IPlay       = ({c}) => <Svg className={c}><polygon points="5 3 19 12 5 21 5 3"/></Svg>;
        const ISearch     = ({c}) => <Svg className={c}><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></Svg>;
        const IFileAudio  = ({c}) => <Svg className={c}><path d="M17.5 22h.5a2 2 0 0 0 2-2V7l-5-5H6a2 2 0 0 0-2 2v3"/><polyline points="14 2 14 8 20 8"/><path d="M2 17v-3a4 4 0 0 1 8 0v3"/><circle cx="9" cy="17" r="1"/><circle cx="3" cy="17" r="1"/></Svg>;
        const IMusic      = ({c}) => <Svg className={c}><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></Svg>;
        const IChevronUp  = ({c}) => <Svg className={c}><polyline points="18 15 12 9 6 15"/></Svg>;
        const IChevronDn  = ({c}) => <Svg className={c}><polyline points="6 9 12 15 18 9"/></Svg>;

        const SUPABASE_URL = "https://anrruvpfkyuiczciabpf.supabase.co";
        const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_CvovmnnKX4rX-U9rU4m7iA_2C-VqfR_";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

const App = () => {
            const [tracks, setTracks] = useState([]);
            const [syncing, setSyncing] = useState(false);
            const [isWaitingForWorker, setIsWaitingForWorker] = useState(false);
            const [searchTerm, setSearchTerm] = useState('');
            const [sortConfig, setSortConfig] = useState({ key: 'title', direction: 'asc' });

            const handleRetrigger = async () => {
                let pat = localStorage.getItem('GITHUB_PAT');
                if (!pat) {
                    pat = prompt("Enter GitHub PAT:");
                    if (!pat) return;
                    localStorage.setItem('GITHUB_PAT', pat);
                }
                setSyncing(true);
                try {
                    const response = await fetch('https://api.github.com/repos/jessemorley/nts2db/actions/workflows/main.yml/dispatches', {
                        method: 'POST',
                        headers: { 'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json' },
                        body: JSON.stringify({ ref: 'main' })
                    });
                    if (response.ok) setIsWaitingForWorker(true);
                    else alert("Failed to trigger sync.");
                } catch (error) { alert(error.message); }
                finally { setSyncing(false); }
            };

            useEffect(() => {
                let channel;
                const fetchTracks = async () => {
                    const { data } = await supabaseClient.from('playlist_tracks').select('*').order('updated_at', { ascending: false });
                    if (data) {
                        setTracks(data);
                        if (data.length > 0) setIsWaitingForWorker(false);
                    }
                };

                const init = async () => {
                    await fetchTracks();
                    channel = supabaseClient.channel('db-changes')
                        .on('postgres_changes', { event: '*', table: 'playlist_tracks', schema: 'public' }, (p) => {
                            setIsWaitingForWorker(false);
                            if (p.eventType === 'INSERT') setTracks(prev => [p.new, ...prev]);
                            else if (p.eventType === 'UPDATE') setTracks(prev => prev.map(t => t.id === p.new.id ? p.new : t));
                        })
                        .subscribe();
                };

                init();
                const poll = setInterval(fetchTracks, 5000);
                return () => { clearInterval(poll); if (channel) supabaseClient.removeChannel(channel); };
            }, []);

            // Derive status from active tracks
            const activeRows = tracks.filter(t => t.status === 'downloading' || t.status === 'uploading');
            const isSyncing = isWaitingForWorker || activeRows.length > 0;

            let workerStatus = 'Idle';
            if (isWaitingForWorker) {
                workerStatus = 'Worker starting...';
            } else if (activeRows.length > 0) {
                const r = activeRows[0];
                const pct = r.progress != null ? ` (${r.progress}%)` : '';
                workerStatus = `${r.status.charAt(0).toUpperCase() + r.status.slice(1)}: ${r.title}${pct}`;
            } else if (tracks.length > 0) {
                const synced = tracks.filter(t => t.status === 'synced').length;
                workerStatus = `${synced} of ${tracks.length} tracks synced`;
            }

            const sortedLibrary = useMemo(() => {
                const STATUS_ORDER = { downloading: 0, uploading: 1, queued: 2, error: 3, pending: 4, synced: 5 };
                let items = tracks.filter(item => {
                    const s = `${item.title} ${item.artist}`.toLowerCase();
                    return s.includes(searchTerm.toLowerCase());
                });
                items.sort((a, b) => {
                    const aActive = STATUS_ORDER[a.status] ?? 9;
                    const bActive = STATUS_ORDER[b.status] ?? 9;
                    if (aActive !== bActive) return aActive - bActive;
                    const aVal = (a[sortConfig.key] || '').toLowerCase();
                    const bVal = (b[sortConfig.key] || '').toLowerCase();
                    if (aVal < bVal) return sortConfig.direction === 'asc' ? -1 : 1;
                    if (aVal > bVal) return sortConfig.direction === 'asc' ? 1 : -1;
                    return 0;
                });
                return items;
            }, [tracks, searchTerm, sortConfig]);

            const requestSort = (key) => {
                setSortConfig(prev => ({
                    key,
                    direction: prev.key === key && prev.direction === 'asc' ? 'desc' : 'asc'
                }));
            };

            const SortIcon = ({ col }) => {
                if (sortConfig.key !== col) return null;
                return sortConfig.direction === 'asc'
                    ? <IChevronUp c="inline-block w-3 h-3 ml-1 align-middle" />
                    : <IChevronDn c="inline-block w-3 h-3 ml-1 align-middle" />;
            };

            return (
                <div className="min-h-screen bg-zinc-950 text-zinc-50 p-4 md:p-8 font-sans antialiased">
                    <div className="max-w-2xl mx-auto space-y-8">

                        {/* Header */}
                        <header className="flex items-center gap-3 border-b border-zinc-800 pb-6">
                            <div className="bg-zinc-50 text-zinc-900 p-2 rounded-md shadow-sm shrink-0">
                                <ICloud c="h-5 w-5" />
                            </div>
                            <div>
                                <h1 className="text-xl font-semibold tracking-tight">SoundDrop</h1>
                                <p className="text-xs text-zinc-500 font-medium">Cloud Automation Worker</p>
                            </div>
                        </header>

                        {/* System Status Card */}
                        <div className="rounded-lg border border-zinc-800 bg-zinc-900 shadow-sm p-6 space-y-4">
                            <div className="flex items-center justify-between">
                                <div className="flex items-center gap-2">
                                    <IActivity c={`h-4 w-4 ${isSyncing ? 'text-zinc-50' : 'text-zinc-600'}`} />
                                    <h2 className="text-xs font-semibold uppercase tracking-wider text-zinc-500">System Status</h2>
                                </div>
                                {isSyncing && (
                                    <div className="flex items-center gap-1.5 text-[10px] font-medium text-zinc-400 bg-zinc-800 px-2 py-0.5 rounded-full border border-zinc-700">
                                        <ILoader c="h-3 w-3 animate-spin" />
                                        Live Sync
                                    </div>
                                )}
                            </div>
                            <div className="flex flex-col sm:flex-row items-stretch gap-3">
                                <div className="flex-1 bg-zinc-800 rounded-md p-3 border border-zinc-700 flex items-center min-w-0">
                                    <span className="text-sm font-medium text-zinc-300 truncate">{workerStatus}</span>
                                </div>
                                <button
                                    onClick={handleRetrigger}
                                    disabled={syncing}
                                    className={`sm:w-auto inline-flex items-center justify-center gap-2 rounded-md px-4 h-10 text-sm font-medium transition-colors focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-50 disabled:pointer-events-none disabled:opacity-50
                                        ${syncing
                                            ? 'bg-zinc-800 text-zinc-600 border border-zinc-700'
                                            : 'bg-zinc-50 text-zinc-900 hover:bg-zinc-200 shadow-sm'
                                        }`}
                                >
                                    {syncing ? <ILoader c="h-4 w-4 animate-spin" /> : <IPlay c="h-4 w-4" />}
                                    {syncing ? 'Triggering...' : 'Sync Now'}
                                </button>
                            </div>
                        </div>

                        {/* Library Section */}
                        <div className="space-y-4">
                            <div className="space-y-3">
                                <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500 px-1">
                                    Music Library ({tracks.length})
                                </h2>
                                <div className="relative w-full">
                                    <span className="absolute left-3 top-1/2 -translate-y-1/2 text-zinc-500 pointer-events-none flex"><ISearch c="h-4 w-4" /></span>
                                    <input
                                        type="text"
                                        placeholder="Search library..."
                                        className="flex h-11 w-full rounded-md border border-zinc-700 bg-zinc-800 text-zinc-50 pl-10 pr-4 py-2 text-sm placeholder:text-zinc-500 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-zinc-50"
                                        value={searchTerm}
                                        onChange={(e) => setSearchTerm(e.target.value)}
                                    />
                                </div>
                            </div>

                            <div className="rounded-md border border-zinc-800 bg-zinc-900 overflow-hidden shadow-sm">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead className="bg-zinc-800/50 border-b border-zinc-800">
                                            <tr className="h-10">
                                                <th
                                                    className="w-1/2 px-4 text-left align-middle cursor-pointer select-none hover:text-zinc-50 transition-colors"
                                                    onClick={() => requestSort('title')}
                                                >
                                                    <div className="flex items-center text-[11px] font-semibold uppercase tracking-wider text-zinc-500">
                                                        Track <SortIcon col="title" />
                                                    </div>
                                                </th>
                                                <th
                                                    className="w-1/3 px-4 text-left align-middle cursor-pointer select-none hover:text-zinc-50 transition-colors"
                                                    onClick={() => requestSort('artist')}
                                                >
                                                    <div className="flex items-center text-[11px] font-semibold uppercase tracking-wider text-zinc-500">
                                                        Artist <SortIcon col="artist" />
                                                    </div>
                                                </th>
                                                <th className="w-1/6 px-4 text-right align-middle">
                                                    <div className="text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Status</div>
                                                </th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-zinc-800">
                                            {sortedLibrary.map((file) => (
                                                <tr key={file.id} className="h-14 hover:bg-zinc-800/50 transition-colors">
                                                    <td className="px-4 align-middle">
                                                        <div className="flex flex-col gap-1.5 min-w-0">
                                                            <div className="flex items-center gap-3">
                                                                <div className={`shrink-0 p-1.5 rounded-sm border transition-all ${
                                                                    file.status === 'synced'   ? 'bg-zinc-800 border-zinc-700 text-zinc-500' :
                                                                    file.status === 'error'    ? 'bg-red-900/40 border-red-800 text-red-400' :
                                                                                                 'bg-zinc-50 border-zinc-50 text-zinc-900'
                                                                }`}>
                                                                    <IFileAudio c="h-3.5 w-3.5" />
                                                                </div>
                                                                <span className={`font-medium text-sm truncate ${file.status === 'synced' ? 'text-zinc-100' : file.status === 'error' ? 'text-red-400' : 'text-zinc-50'}`}>
                                                                    {file.title}
                                                                </span>
                                                            </div>
                                                            {(file.status === 'downloading' || file.status === 'uploading') && (
                                                                <div className="pl-10 pr-2">
                                                                    <div className="h-1 w-full bg-zinc-700 rounded-full overflow-hidden">
                                                                        <div
                                                                            className="h-full bg-zinc-50 transition-all duration-300 ease-in-out"
                                                                            style={{ width: `${file.progress || 0}%` }}
                                                                        />
                                                                    </div>
                                                                </div>
                                                            )}
                                                        </div>
                                                    </td>
                                                    <td className="px-4 align-middle">
                                                        <span className="text-xs text-zinc-500 font-medium truncate block">{file.artist}</span>
                                                    </td>
                                                    <td className="px-4 align-middle text-right">
                                                        {file.status !== 'synced' && (
                                                            <span className={`inline-flex items-center text-[10px] font-semibold uppercase tracking-wider px-2 py-0.5 rounded-full whitespace-nowrap border ${
                                                                file.status === 'error'                                    ? 'text-red-400 bg-red-900/30 border-red-800' :
                                                                file.status === 'downloading' || file.status === 'uploading' ? 'text-zinc-50 bg-zinc-700 border-zinc-600' :
                                                                                                                               'text-zinc-500 bg-zinc-800 border-zinc-700'
                                                            }`}>
                                                                {file.status}
                                                            </span>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                            {sortedLibrary.length === 0 && (
                                                <tr>
                                                    <td colSpan="3" className="h-48 text-center">
                                                        <div className="flex flex-col items-center justify-center gap-2">
                                                            <IMusic c="h-8 w-8 text-zinc-700" />
                                                            <p className="text-xs font-medium text-zinc-500">No results found in library</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
