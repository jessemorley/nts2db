<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundDrop Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://anrruvpfkyuiczciabpf.supabase.co";
        const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_CvovmnnKX4rX-U9rU4m7iA_2C-VqfR_";
        
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

        const App = () => {
            const [syncHistory, setSyncHistory] = useState([]);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [isWaitingForWorker, setIsWaitingForWorker] = useState(false);

            const handleRetrigger = async () => {
                let pat = localStorage.getItem('GITHUB_PAT');
                if (!pat) {
                    pat = prompt("Enter your GitHub Personal Access Token (PAT):");
                    if (!pat) return;
                    localStorage.setItem('GITHUB_PAT', pat);
                }

                setSyncing(true);
                try {
                    const response = await fetch('https://api.github.com/repos/jessemorley/nts2db/actions/workflows/main.yml/dispatches', {
                        method: 'POST',
                        headers: {
                            'Authorization': `Bearer ${pat}`,
                            'Accept': 'application/vnd.github+json',
                            'X-GitHub-Api-Version': '2022-11-28'
                        },
                        body: JSON.stringify({ ref: 'main' })
                    });

                    if (response.ok) {
                        setIsWaitingForWorker(true);
                    } else {
                        const err = await response.json().catch(() => ({ message: "Unknown error" }));
                        alert(`❌ Failed: ${err.message}`);
                    }
                } catch (error) {
                    alert(`❌ Error: ${error.message}`);
                } finally {
                    setSyncing(false);
                }
            };

            useEffect(() => {
                const init = async () => {
                    const { data } = await supabaseClient
                        .from('sync_history')
                        .select('*')
                        .order('created_at', { ascending: false })
                        .limit(10);
                    
                    if (data) setSyncHistory(data);
                    setLoading(false);

                    const channel = supabaseClient
                        .channel('sync-updates')
                        .on('postgres_changes', 
                            { event: '*', table: 'sync_history', schema: 'public' }, 
                            (payload) => {
                                if (payload.eventType === 'INSERT') {
                                    setSyncHistory(prev => [payload.new, ...prev].slice(0, 10));
                                    setIsWaitingForWorker(false);
                                } else if (payload.eventType === 'UPDATE') {
                                    setSyncHistory(prev => prev.map(item => 
                                        item.id === payload.new.id ? payload.new : item
                                    ));
                                }
                            }
                        )
                        .subscribe();

                    return () => supabaseClient.removeChannel(channel);
                };
                init();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [loading, syncHistory, syncing, isWaitingForWorker]);

            const getStatusColor = (status) => {
                switch(status) {
                    case 'success': return 'text-emerald-500 border-emerald-500/20 bg-emerald-500/5';
                    case 'downloading': return 'text-blue-400 border-blue-400/20 bg-blue-400/5';
                    case 'uploading': return 'text-purple-400 border-purple-400/20 bg-purple-400/5';
                    case 'error': return 'text-red-500 border-red-500/20 bg-red-500/5';
                    case 'info': return 'text-amber-400 border-amber-400/20 bg-amber-400/5';
                    default: return 'text-white/40 border-white/10 bg-white/5';
                }
            };

            return (
                <div className="min-h-screen max-w-4xl mx-auto p-6 space-y-8">
                    <header className="flex justify-between items-center border-b border-white/10 pb-6">
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-500 p-2 rounded-xl text-black shadow-[0_0_20px_rgba(16,185,129,0.4)]">
                                <i data-lucide="music"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter leading-none text-white">SOUNDDROP</h1>
                                <p className="text-[10px] opacity-40 font-bold uppercase tracking-widest mt-1 text-white">Live Dashboard</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <button 
                                onClick={handleRetrigger}
                                className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-white bg-white/5 px-4 py-2 rounded-xl border border-white/10 hover:bg-white/10 transition-all active:scale-95 disabled:opacity-50 group"
                                disabled={syncing}
                            >
                                <i data-lucide="refresh-cw" className={`w-3 h-3 ${syncing ? 'animate-spin' : ''}`}></i>
                                {syncing ? 'Triggering...' : 'Sync Now'}
                            </button>
                        </div>
                    </header>

                    <section className="grid grid-cols-1 md:grid-cols-3 gap-8">
                        <div className="md:col-span-2 space-y-4">
                            <h2 className="text-sm font-bold opacity-40 uppercase tracking-widest flex items-center gap-2 text-white">
                                <i data-lucide="list" className="w-4 h-4"></i> Live Sync Log
                            </h2>
                            <div className="space-y-3">
                                {isWaitingForWorker && (
                                    <div className="bg-emerald-500/5 border border-emerald-500/20 rounded-2xl p-5 flex items-center gap-4 animate-pulse">
                                        <div className="w-12 h-12 bg-emerald-500/20 rounded-xl flex items-center justify-center text-emerald-500">
                                            <i data-lucide="zap" className="animate-bounce"></i>
                                        </div>
                                        <div>
                                            <p className="font-bold text-sm text-emerald-400 italic">Worker starting...</p>
                                            <p className="text-[10px] opacity-40 uppercase font-black">Connecting to SoundCloud</p>
                                        </div>
                                    </div>
                                )}
                                {syncHistory.map(item => (
                                    <div key={item.id} className="bg-white/5 border border-white/10 rounded-2xl p-5 space-y-4 group hover:bg-white/[0.08] transition-all">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-4">
                                                <div className={`w-12 h-12 rounded-xl flex items-center justify-center ${item.status === 'success' ? 'text-emerald-500 bg-emerald-500/10' : 'text-white/40 bg-white/10'}`}>
                                                    <i data-lucide={item.status === 'info' ? 'search' : 'disc'}></i>
                                                </div>
                                                <div>
                                                    <p className="font-bold text-sm text-white">{item.title}</p>
                                                    <p className="text-[10px] opacity-40 uppercase font-black text-white">
                                                        {item.artist} • {new Date(item.created_at).toLocaleTimeString()}
                                                    </p>
                                                </div>
                                            </div>
                                            <div className={`text-[9px] font-black border px-2 py-1 rounded-md tracking-tighter uppercase ${getStatusColor(item.status)}`}>
                                                {item.status}
                                            </div>
                                        </div>
                                        {(item.status === 'downloading' || item.status === 'uploading') && (
                                            <div className="space-y-2">
                                                <div className="flex justify-between text-[9px] font-black uppercase tracking-widest opacity-40">
                                                    <span>{item.status === 'downloading' ? 'Progress' : 'Ready to Upload'}</span>
                                                    <span>{item.progress || 0}%</span>
                                                </div>
                                                <div className="h-1.5 w-full bg-white/5 rounded-full overflow-hidden">
                                                    <div 
                                                        className="h-full bg-emerald-500 transition-all duration-500 ease-out"
                                                        style={{ width: `${item.progress || 0}%` }}
                                                    ></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-6">
                            <div className="bg-gradient-to-br from-emerald-500 to-emerald-600 text-black rounded-2xl p-6 shadow-xl">
                                <h3 className="font-bold flex items-center gap-2 mb-3 italic uppercase text-xs tracking-widest">
                                    <i data-lucide="zap" className="w-4 h-4 fill-current"></i> Real-time Engine
                                </h3>
                                <p className="text-xs font-medium opacity-90 leading-relaxed">Dashboard listens for <b>UPDATE</b> events to show live progress bars and discovery counts.</p>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
