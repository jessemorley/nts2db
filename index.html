<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SoundDrop Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-[#0a0a0a] text-white font-sans overflow-x-hidden">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://anrruvpfkyuiczciabpf.supabase.co";
        const SUPABASE_PUBLISHABLE_KEY = "sb_publishable_CvovmnnKX4rX-U9rU4m7iA_2C-VqfR_";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_PUBLISHABLE_KEY);

        const App = () => {
            const [syncHistory, setSyncHistory] = useState([]);
            const [inventory, setInventory] = useState([]);
            const [loading, setLoading] = useState(true);
            const [syncing, setSyncing] = useState(false);
            const [isWaitingForWorker, setIsWaitingForWorker] = useState(false);

            const handleRetrigger = async () => {
                let pat = localStorage.getItem('GITHUB_PAT');
                if (!pat) {
                    pat = prompt("Enter GitHub PAT:");
                    if (!pat) return;
                    localStorage.setItem('GITHUB_PAT', pat);
                }
                setSyncing(true);
                try {
                    const response = await fetch('https://api.github.com/repos/jessemorley/nts2db/actions/workflows/main.yml/dispatches', {
                        method: 'POST',
                        headers: {'Authorization': `Bearer ${pat}`, 'Accept': 'application/vnd.github+json'},
                        body: JSON.stringify({ ref: 'main' })
                    });
                    if (response.ok) setIsWaitingForWorker(true);
                    else alert("Failed to trigger sync.");
                } catch (error) { alert(error.message); }
                finally { setSyncing(false); }
            };

            useEffect(() => {
                let channel;

                const init = async () => {
                    const { data: logs } = await supabaseClient.from('sync_history').select('*').order('created_at', { ascending: false }).limit(10);
                    if (logs) setSyncHistory(logs);

                    const { data: files } = await supabaseClient.from('dropbox_inventory').select('*').order('name', { ascending: true });
                    if (files) setInventory(files);

                    setLoading(false);

                    channel = supabaseClient.channel('db-changes')
                        .on('postgres_changes', { event: '*', table: 'sync_history', schema: 'public' }, (p) => {
                            setIsWaitingForWorker(false);
                            if (p.eventType === 'INSERT') { setSyncHistory(prev => [p.new, ...prev].slice(0, 10)); }
                            else if (p.eventType === 'UPDATE') { setSyncHistory(prev => prev.map(i => i.id === p.new.id ? p.new : i)); }
                        })
                        .on('postgres_changes', { event: '*', table: 'dropbox_inventory', schema: 'public' }, async () => {
                            const { data } = await supabaseClient.from('dropbox_inventory').select('*').order('name', { ascending: true });
                            if (data) setInventory(data);
                        })
                        .subscribe();
                };

                init();

                // Polling fallback — realtime subscription may miss events if not yet ready
                const poll = setInterval(async () => {
                    const { data } = await supabaseClient.from('sync_history').select('*').order('created_at', { ascending: false }).limit(10);
                    if (data) {
                        setSyncHistory(data);
                        setIsWaitingForWorker(false);
                    }
                }, 5000);

                return () => {
                    clearInterval(poll);
                    if (channel) supabaseClient.removeChannel(channel);
                };
            }, []);

            useEffect(() => { lucide.createIcons(); }, [loading, syncHistory, inventory, isWaitingForWorker]);

            const getStatusColor = (status) => {
                switch(status) {
                    case 'success': return 'text-emerald-500 border-emerald-500/20 bg-emerald-500/5';
                    case 'exists': return 'text-amber-400 border-amber-400/20 bg-amber-400/5';
                    case 'downloading': return 'text-blue-400 border-blue-400/20 bg-blue-400/5';
                    case 'uploading': return 'text-purple-400 border-purple-400/20 bg-purple-400/5';
                    case 'error': return 'text-red-500 border-red-500/20 bg-red-500/5';
                    default: return 'text-white/40 border-white/10 bg-white/5';
                }
            };

            return (
                <div className="min-h-screen max-w-6xl mx-auto p-6 space-y-8">
                    <header className="flex justify-between items-center border-b border-white/10 pb-6">
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-500 p-2 rounded-xl text-black shadow-[0_0_20px_rgba(16,185,129,0.4)]">
                                <i data-lucide="music"></i>
                            </div>
                            <div>
                                <h1 className="text-2xl font-black italic tracking-tighter leading-none">SOUNDDROP</h1>
                                <p className="text-[10px] opacity-40 font-bold uppercase tracking-widest mt-1">Live Sync Dashboard</p>
                            </div>
                        </div>
                        <button onClick={handleRetrigger} disabled={syncing} className="flex items-center gap-2 text-[10px] font-bold uppercase tracking-widest text-white bg-white/5 px-4 py-2 rounded-xl border border-white/10 hover:bg-white/10 transition-all active:scale-95 disabled:opacity-50">
                            <i data-lucide="refresh-cw" className={syncing ? 'animate-spin' : ''}></i>
                            {syncing ? 'Triggering...' : 'Sync Now'}
                        </button>
                    </header>

                    <section className="grid grid-cols-1 lg:grid-cols-3 gap-8 items-start">
                        <div className="lg:col-span-2 space-y-4">
                            <h2 className="text-[10px] font-bold opacity-40 uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="list" className="w-3 h-3"></i> Recent Activity
                            </h2>
                            <div className="space-y-3">
                                {isWaitingForWorker && (
                                    <div className="bg-emerald-500/5 border border-emerald-500/20 rounded-2xl p-5 flex items-center gap-4 animate-pulse">
                                        <div className="w-10 h-10 bg-emerald-500/20 rounded-xl flex items-center justify-center text-emerald-500"><i data-lucide="zap"></i></div>
                                        <div><p className="font-bold text-sm text-emerald-400">Worker Starting...</p></div>
                                    </div>
                                )}
                                {syncHistory.map(item => (
                                    <div key={item.id} className="bg-white/5 border border-white/10 rounded-2xl p-5 space-y-4 group hover:border-white/20 transition-all">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-4 text-left">
                                                <div className={`w-10 h-10 rounded-xl flex items-center justify-center ${item.status === 'success' ? 'text-emerald-500 bg-emerald-500/10' : 'text-white/20 bg-white/10'}`}>
                                                    <i data-lucide={item.status === 'exists' ? 'check-circle' : 'disc'} className="w-5 h-5"></i>
                                                </div>
                                                <div>
                                                    <p className="font-bold text-sm truncate max-w-[200px] md:max-w-md">{item.title}</p>
                                                    <p className="text-[10px] opacity-40 uppercase font-black">{item.artist} • {new Date(item.created_at).toLocaleTimeString()}</p>
                                                </div>
                                            </div>
                                            <div className={`text-[8px] font-black border px-2 py-1 rounded-md tracking-widest uppercase ${getStatusColor(item.status)}`}>
                                                {item.status === 'exists' ? 'Skipped' : item.status}
                                            </div>
                                        </div>
                                        {(item.status === 'downloading' || item.status === 'uploading') && (
                                            <div className="space-y-2">
                                                <div className="flex justify-between text-[8px] font-black uppercase opacity-40">
                                                    <span>{item.status}</span>
                                                    <span>{item.progress || 0}%</span>
                                                </div>
                                                <div className="h-1 w-full bg-white/5 rounded-full overflow-hidden">
                                                    <div className="h-full bg-emerald-500 transition-all duration-500" style={{ width: `${item.progress || 0}%` }}></div>
                                                </div>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="space-y-4">
                            <h2 className="text-[10px] font-bold opacity-40 uppercase tracking-widest flex items-center gap-2">
                                <i data-lucide="folder" className="w-3 h-3"></i> Dropbox Library ({inventory.length})
                            </h2>
                            <div className="bg-white/5 border border-white/10 rounded-2xl overflow-hidden">
                                <div className="max-h-[600px] overflow-y-auto p-2 space-y-1 scrollbar-hide">
                                    {inventory.length === 0 ? (
                                        <div className="p-8 text-center opacity-20 text-xs italic">Library empty</div>
                                    ) : inventory.map((file, idx) => (
                                        <div key={idx} className="flex items-center gap-3 p-3 hover:bg-white/5 rounded-xl transition-all group">
                                            <i data-lucide="file-audio" className="w-3 h-3 text-emerald-500/40 group-hover:text-emerald-500"></i>
                                            <p className="text-[11px] font-medium truncate opacity-60 group-hover:opacity-100">{file.name.replace(/\.mp3$/i, '')}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
