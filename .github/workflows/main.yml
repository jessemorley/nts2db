name: Hourly Music Sync
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  # Opt into Node.js 24 for actions as per deprecation notice
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          
      - name: Run Sync
        env:
          SC_CLIENT_ID: ${{ secrets.SC_CLIENT_ID }}
          SC_USER_ID: ${{ secrets.SC_USER_ID }}
          DBX_APP_KEY: ${{ secrets.DBX_APP_KEY }}
          DBX_APP_SECRET: ${{ secrets.DBX_APP_SECRET }}
          DBX_REFRESH_TOKEN: ${{ secrets.DBX_REFRESH_TOKEN }}
        run: python sync.py